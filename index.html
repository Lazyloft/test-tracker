<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Test Tracker - Analytics</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--ink:#1f2a24;--paper:#faf7f0;--line:#d9d2c2;--accent:#c9622f;--pending:#8a8170;--pending-bg:#eee9dd;--done:#3d7a5c;--perfect:#3563a8;}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-tap-highlight-color:transparent;}
.app{max-width:100%;min-height:100vh;display:flex;flex-direction:column;padding-bottom:24px;}
header{padding:16px 16px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:20;}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:4px;}
h1{font-size:20px;margin:0 0 10px;font-weight:800;}
.class-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;}
.class-chip{flex:0 0 auto;padding:7px 14px;border-radius:20px;border:1px solid var(--line);background:white;font-size:13px;font-weight:600;color:var(--pending);cursor:pointer;}
.class-chip.active{background:var(--accent);color:white;border-color:var(--accent);}
.add-class{display:flex;gap:6px;margin-top:8px;}
.add-class input{flex:1;font-size:13px;padding:7px 10px;border:1px solid var(--line);border-radius:8px;}
section{padding:14px 16px;}
.panel{background:white;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;}
.panel h2{margin:0 0 10px;font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;}
.row-f{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
input[type=text],input[type=date],select{font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:white;color:var(--ink);}
button{border:none;cursor:pointer;font-family:inherit;font-weight:700;border-radius:8px;font-size:13px;padding:8px 12px;}
.btn-main{background:var(--accent);color:white;}
.btn-ghost{background:var(--pending-bg);color:var(--ink);}
.btn-active{background:var(--perfect);color:white;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.table-scroll{overflow-x:auto;border-radius:10px;border:1px solid var(--line);}
table{border-collapse:collapse;width:100%;font-size:12px;}
th,td{border:1px solid var(--line);padding:5px 7px;text-align:center;white-space:nowrap;}
th{background:#f1ede1;font-size:11px;}
th.test-hd{background:#e3ddd0;font-size:12px;}
th.clickable{cursor:pointer;color:var(--accent);text-decoration:underline dotted;}
th.p1h{background:#fffbe6;}
th.p2h{background:#f0f8f0;}
th.toth{background:#e8f4fd;}
td.entered{font-weight:700;}
td.computed{color:var(--pending);font-style:italic;}
td.red-total{color:red;font-weight:700;}
td:first-child{text-align:left;min-width:110px;}
.del-btn{background:none;color:var(--pending);font-size:13px;padding:1px 4px;border-radius:4px;border:none;cursor:pointer;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50;padding:12px;}
.modal-overlay.show{display:flex;}
.modal{background:white;border-radius:14px;padding:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;}
.modal h3{margin:0 0 8px;font-size:16px;}
.modal p{font-size:13px;color:var(--pending);margin:0 0 10px;}
.paper-toggle-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.stu-grid{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0;}
.stu-btn{padding:9px 14px;border-radius:10px;background:var(--pending-bg);color:var(--ink);font-size:13px;font-weight:600;border:none;cursor:pointer;}
.score-display{font-size:36px;font-weight:800;text-align:center;padding:12px;background:var(--paper);border-radius:10px;margin:10px 0;color:var(--ink);}
.mark-grid{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0;}
.mark-btn{width:44px;height:44px;border-radius:8px;background:var(--pending-bg);color:var(--ink);font-size:13px;font-weight:700;padding:0;border:none;cursor:pointer;flex-shrink:0;}
.mark-btn.sel{background:var(--accent);color:white;}
.half-btn{padding:8px 18px;border-radius:8px;background:var(--pending-bg);color:var(--ink);}
.half-btn.on{background:#6a4c9c;color:white;}
footer{margin-top:auto;text-align:center;font-size:11px;color:var(--pending);padding:18px;}
.empty-state{text-align:center;color:var(--pending);font-size:13px;padding:30px 10px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px;}
.stat-card{background:var(--paper);padding:10px;border-radius:8px;text-align:center;}
.stat-label{font-size:10px;color:var(--pending);text-transform:uppercase;letter-spacing:.06em;}
.stat-value{font-size:20px;font-weight:800;margin-top:2px;}
.stat-trend{font-size:12px;margin-top:2px;}
.grade-bar{display:flex;height:24px;border-radius:4px;overflow:hidden;margin-top:4px;}
.grade-segment{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;transition:width 0.3s;}
.tab-row{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.tab-btn{padding:6px 14px;border-radius:20px;background:var(--pending-bg);font-size:12px;border:none;cursor:pointer;font-weight:600;}
.tab-btn.active{background:var(--accent);color:white;}
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:600px){.analytics-grid{grid-template-columns:1fr;}}
.student-rank{display:flex;justify-content:space-between;padding:6px 8px;border-bottom:1px solid var(--line);font-size:12px;}
.student-rank:last-child{border-bottom:none;}
.student-rank .rank-num{font-weight:700;color:var(--accent);margin-right:8px;}
.student-rank .rank-score{font-weight:700;}
.student-rank .rank-medal{font-size:16px;margin-right:4px;}
.rank-1{background:#fff6e6;}
.rank-2{background:#f5f5f5;}
.rank-3{background:#fef3e0;}
.chart-container{background:white;border-radius:8px;padding:8px;margin:8px 0;border:1px solid var(--line);}
.chart-container canvas{width:100% !important;height:auto !important;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="eyebrow">Test Tracker</div>
    <h1>Class test scores</h1>
    <div class="btn-row">
      <button class="btn-ghost" id="syncStatusBtn" onclick="showSyncPanel()">☁️ Sync: Off</button>
      <button class="btn-ghost" id="deleteClassBtn" style="display:none" onclick="deleteActiveClass()">🗑 Delete class</button>
    </div>
    <div class="class-row" id="classRow"></div>
    <div class="add-class">
      <input type="text" id="newClassName" placeholder="New class name (e.g. P5 Science)">
      <button class="btn-main" id="addClassBtn">Add class</button>
    </div>
  </header>
  <section id="content"></section>
  <footer>Data saved automatically · Synced via GitHub Gist when connected</footer>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBody"></div></div>
<canvas id="offscreenChart" style="display:none;"></canvas>
<script>
const STORAGE_KEY='testTrackerData_v1';
const SYNC_CFG_KEY='testTrackerSyncCfg_v1';
let state=loadState();
let activeClassId=state.classOrder[0]||null;
let mmTestId=null,mmPaper='p1a',mmStuId=null,mmScore=null,mmView='students';
let analyticsTab='overview';
const PAPER_LABEL={'p1a':'Paper 1A','p1b':'Paper 1B','p2':'Paper 2'};
const PAPER_MAX={'p1a':26,'p1b':25,'p2':55};

function loadState(){
  try{const r=localStorage.getItem(STORAGE_KEY);if(r){const p=JSON.parse(r);if(p&&p.classOrder)return p;}}catch(e){}
  return{classOrder:[],classes:{}};
}
let saveTimer=null;
function saveState(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  if(syncToken&&syncGistId){clearTimeout(saveTimer);saveTimer=setTimeout(pushToCloud,800);}
}
function uid(p){return(p||'x')+'_'+Math.random().toString(36).slice(2,9);}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function escX(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[m]));}
function showModal(html){document.getElementById('modalBody').innerHTML=html;document.getElementById('modalOverlay').classList.add('show');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function fmt(v){return(v===null||v===undefined)?'—':v;}

// SYNC
let syncToken='',syncGistId='',pollHandle=null,applyingRemote=false,lastRemoteJson=null;
function loadSyncCfg(){try{const r=localStorage.getItem(SYNC_CFG_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function saveSyncCfg(c){localStorage.setItem(SYNC_CFG_KEY,JSON.stringify(c));}
function initSync(){const c=loadSyncCfg();if(c&&c.token&&c.gistId)connectSync(c.token,c.gistId,true);}
async function connectSync(token,gistId,silent){
  syncToken=token.trim();gistId=(gistId||'').trim();
  try{
    if(!gistId){
      const res=await fetch('https://api.github.com/gists',{method:'POST',
        headers:{'Authorization':'token '+syncToken,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
        body:JSON.stringify({description:'Test Tracker data',public:false,
          files:{'testTracker.json':{content:JSON.stringify({json:JSON.stringify(state),updatedAt:Date.now()})}}})});
      if(!res.ok){const e=await res.json();throw new Error(e.message||'Status '+res.status);}
      const d=await res.json();gistId=d.id;
      alert('Sync database created!\n\nGist ID: '+gistId+'\n\nWrite this down — enter it on your other device to link them.');
    }
    syncGistId=gistId;saveSyncCfg({token:syncToken,gistId:syncGistId});
    updateSyncBtn(true);
    if(pollHandle)clearInterval(pollHandle);
    await pollOnce();pollHandle=setInterval(pollOnce,5000);
    if(!silent)closeModal();
  }catch(err){console.warn(err);updateSyncBtn(false);if(!silent)alert('Could not connect.\n\n'+err.message);}
}
async function pollOnce(){
  if(!syncToken||!syncGistId)return;
  try{
    const res=await fetch('https://api.github.com/gists/'+syncGistId,
      {headers:{'Authorization':'token '+syncToken,'Accept':'application/vnd.github+json'}});
    if(!res.ok)return;
    const data=await res.json();
    const file=data.files&&data.files['testTracker.json'];if(!file)return;
    const record=JSON.parse(file.content);
    const remoteJson=record&&record.json;if(!remoteJson)return;
    if(remoteJson===lastRemoteJson)return;
    const remoteState=JSON.parse(remoteJson);
    if(remoteState.classOrder.length===0&&state.classOrder.length>0){lastRemoteJson=remoteJson;pushToCloud();return;}
    lastRemoteJson=remoteJson;applyingRemote=true;
    state=remoteState;
    if(!state.classOrder.includes(activeClassId))activeClassId=state.classOrder[0]||null;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
    renderAll();applyingRemote=false;
  }catch(e){console.warn('Poll failed',e);}
}
async function pushToCloud(){
  if(!syncToken||!syncGistId||applyingRemote)return;
  const json=JSON.stringify(state);lastRemoteJson=json;
  try{await fetch('https://api.github.com/gists/'+syncGistId,{method:'PATCH',
    headers:{'Authorization':'token '+syncToken,'Content-Type':'application/json','Accept':'application/vnd.github+json'},
    body:JSON.stringify({files:{'testTracker.json':{content:JSON.stringify({json,updatedAt:Date.now()})}}})});}
  catch(e){console.warn('Push failed',e);}
}
function updateSyncBtn(on){const b=document.getElementById('syncStatusBtn');if(b)b.textContent=on?'☁️ Sync: On':'☁️ Sync: Off';}
function showSyncPanel(){
  const c=loadSyncCfg()||{};
  showModal(`<h3>☁️ Sync between devices</h3>
    <p>Create a GitHub Personal Access Token at:<br><b>github.com → Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token (classic)</b><br>Tick only the <b>gist</b> scope.</p>
    <div style="margin-bottom:8px;"><input type="text" id="cfgToken" placeholder="GitHub token (ghp_...)" value="${esc(c.token||'')}" style="width:100%;font-size:12px;"></div>
    <div style="margin-bottom:8px;"><input type="text" id="cfgGistId" placeholder="Gist ID (leave blank on first device)" value="${esc(c.gistId||'')}" style="width:100%;"></div>
    <p style="font-size:11px;">Leave Gist ID blank on first device — app creates one and shows the ID. Enter same ID on other devices.</p>
    <div class="btn-row"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn-main" onclick="onConnectSync()">Connect</button></div>`);
}
function onConnectSync(){
  const t=document.getElementById('cfgToken').value.trim();
  const g=document.getElementById('cfgGistId').value.trim();
  if(!t){alert('Please enter your GitHub token.');return;}
  connectSync(t,g,false);
}

// CLASS
function getClass(){return activeClassId?state.classes[activeClassId]:null;}
function renderClassRow(){
  const row=document.getElementById('classRow');row.innerHTML='';
  state.classOrder.forEach(id=>{
    const c=state.classes[id];const chip=document.createElement('div');
    chip.className='class-chip'+(id===activeClassId?' active':'');
    chip.textContent=c.name;chip.onclick=()=>{activeClassId=id;renderAll();};row.appendChild(chip);
  });
  const d=document.getElementById('deleteClassBtn');if(d)d.style.display=activeClassId?'inline-block':'none';
}
function addClass(name){
  if(!name.trim())return;const id=uid('cls');
  state.classes[id]={id,name:name.trim(),students:[],tests:[],marks:{}};
  state.classOrder.push(id);activeClassId=id;saveState();renderAll();
}
function deleteActiveClass(){if(activeClassId)deleteClass(activeClassId);}
function deleteClass(classId){
  const c=state.classes[classId];if(!c)return;
  if(!confirm(`⚠️ Delete "${c.name}"?\n\n• ${c.students.length} student(s)\n• ${c.tests.length} test(s)\n• All marks\n\nCannot be undone.`))return;
  if(!confirm(`Final check — delete all data for "${c.name}"?`))return;
  state.classOrder=state.classOrder.filter(id=>id!==classId);delete state.classes[classId];
  activeClassId=state.classOrder[0]||null;saveState();renderAll();
}

// STUDENTS
function addStudent(name){
  const c=getClass();if(!c||!name.trim())return;
  c.students.push({id:uid('stu'),name:name.trim()});saveState();renderTable();renderReportSel();
}
function deleteStudent(stuId){
  const c=getClass();if(!c)return;
  if(!confirm('Remove this student and all their marks?'))return;
  c.students=c.students.filter(s=>s.id!==stuId);delete c.marks[stuId];saveState();renderTable();renderReportSel();
}

// TESTS
function addTest(name,date){
  const c=getClass();if(!c||!name.trim())return;
  const id=uid('tst');c.tests.push({id,name:name.trim(),date:date||'',locked:false,hidden:false});
  saveState();renderTable();
}
function deleteTest(testId){
  const c=getClass();if(!c)return;
  const t=c.tests.find(t=>t.id===testId);
  if(t&&t.locked){alert('Column is locked. Tap 🔒 to unlock first.');return;}
  if(!confirm(`Delete test "${t?t.name:''}" and all its marks?`))return;
  c.tests=c.tests.filter(t=>t.id!==testId);
  Object.keys(c.marks).forEach(sid=>{if(c.marks[sid])delete c.marks[sid][testId];});
  saveState();renderTable();
}
function toggleTestLock(testId){
  const c=getClass();const t=c&&c.tests.find(t=>t.id===testId);if(!t)return;
  t.locked=!t.locked;saveState();renderTable();
}
function hideTest(testId){
  const c=getClass();const t=c&&c.tests.find(t=>t.id===testId);if(!t)return;
  if(!confirm(`Hide "${t.name}"? Data preserved.`))return;
  t.hidden=true;saveState();renderTable();
}
function showUnhidePanel(){
  const c=getClass();if(!c)return;
  const hidden=c.tests.filter(t=>!!t.hidden).sort((a,b)=>b.date.localeCompare(a.date));
  if(!hidden.length){alert('No hidden tests.');return;}
  window._uhSel=new Set();
  const btns=hidden.map(t=>`<div id="uhsel_${t.id}" onclick="toggleUhSel('${t.id}')" style="padding:10px 14px;border-radius:10px;border:2px solid var(--line);background:white;cursor:pointer;margin-bottom:8px;">
    <div style="font-weight:700;">${esc(t.name)}</div>
    <div style="font-size:12px;color:var(--pending);">${t.date||'No date'}</div></div>`).join('');
  showModal(`<h3>Unhide tests</h3><p>Tap to select, then tap Unhide selected.</p>
    <div>${btns}</div>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-main" onclick="confirmUnhide()">Unhide selected</button>
    </div>`);
}
function toggleUhSel(id){
  if(!window._uhSel)window._uhSel=new Set();
  const el=document.getElementById('uhsel_'+id);
  if(window._uhSel.has(id)){window._uhSel.delete(id);el.style.borderColor='var(--line)';el.style.background='white';}
  else{window._uhSel.add(id);el.style.borderColor='var(--accent)';el.style.background='#fbe7df';}
}
function confirmUnhide(){
  if(!window._uhSel||!window._uhSel.size){alert('No tests selected.');return;}
  const c=getClass();if(!c)return;
  const names=[...window._uhSel].map(id=>{const t=c.tests.find(t=>t.id===id);return t?t.name:'';}).filter(Boolean);
  if(!confirm(`Unhide these tests?\n\n${names.join('\n')}`))return;
  window._uhSel.forEach(id=>{const t=c.tests.find(t=>t.id===id);if(t)t.hidden=false;});
  window._uhSel=new Set();saveState();closeModal();renderTable();
}

// MARKS
function getMark(stuId,testId,paper){
  const c=getClass();if(!c)return null;
  const m=c.marks[stuId]&&c.marks[stuId][testId];if(!m)return null;
  const v=m[paper];return(v===undefined||v===null)?null:v;
}
function setMarkData(stuId,testId,paper,value){
  const c=getClass();if(!c)return;
  if(!c.marks[stuId])c.marks[stuId]={};
  if(!c.marks[stuId][testId])c.marks[stuId][testId]={};
  if(value===null)delete c.marks[stuId][testId][paper];
  else c.marks[stuId][testId][paper]=value;
  saveState();
}
function getP1(stuId,testId){const a=getMark(stuId,testId,'p1a'),b=getMark(stuId,testId,'p1b');return(a===null||b===null)?null:a+b;}
function getTotal(stuId,testId){const p1=getP1(stuId,testId),p2=getMark(stuId,testId,'p2');return(p1===null||p2===null)?null:p1+p2;}

// =============== STATISTICS FUNCTIONS ===============

function getClassStats() {
  const c = getClass();
  if (!c || !c.students.length || !c.tests.length) return null;
  
  const visibleTests = c.tests.filter(t => !t.hidden);
  if (!visibleTests.length) return null;
  
  const stats = {
    students: c.students.length,
    tests: visibleTests.length,
    studentAverages: {},
    gradeDistribution: { A: 0, B: 0, C: 0, D: 0, F: 0 },
    testAverages: {},
    allScores: [],
    topPerformer: null,
    topScore: 0,
    lowScore: 100
  };
  
  let totalScores = 0;
  let count = 0;
  
  c.students.forEach(student => {
    let studentTotal = 0;
    let studentTests = 0;
    
    visibleTests.forEach(test => {
      const total = getTotal(student.id, test.id);
      if (total !== null) {
        studentTotal += total;
        studentTests++;
        totalScores += total;
        count++;
        stats.allScores.push(total);
        
        const grade = total >= 80 ? 'A' : total >= 65 ? 'B' : total >= 50 ? 'C' : total >= 40 ? 'D' : 'F';
        stats.gradeDistribution[grade]++;
        
        if (total > stats.topScore) stats.topScore = total;
        if (total < stats.lowScore) stats.lowScore = total;
        
        if (!stats.testAverages[test.id]) stats.testAverages[test.id] = { total: 0, count: 0, name: test.name };
        stats.testAverages[test.id].total += total;
        stats.testAverages[test.id].count++;
      }
    });
    
    if (studentTests > 0) {
      const avg = studentTotal / studentTests;
      stats.studentAverages[student.id] = { avg, name: student.name, count: studentTests };
    }
  });
  
  Object.keys(stats.testAverages).forEach(key => {
    const t = stats.testAverages[key];
    t.average = t.total / t.count;
  });
  
  stats.classAverage = count > 0 ? (totalScores / count) : 0;
  stats.passRate = ((stats.gradeDistribution.A + stats.gradeDistribution.B + stats.gradeDistribution.C) / count * 100) || 0;
  
  let topAvg = 0;
  Object.keys(stats.studentAverages).forEach(key => {
    const s = stats.studentAverages[key];
    if (s.avg > topAvg) {
      topAvg = s.avg;
      stats.topPerformer = { id: key, name: s.name, avg: s.avg };
    }
  });
  
  const sorted = [...stats.allScores].sort((a, b) => a - b);
  stats.median = sorted.length > 0 ? sorted[Math.floor(sorted.length / 2)] : 0;
  
  if (stats.allScores.length > 0) {
    const mean = stats.classAverage;
    const squareDiffs = stats.allScores.map(value => Math.pow(value - mean, 2));
    const avgSquareDiff = squareDiffs.reduce((a, b) => a + b, 0) / squareDiffs.length;
    stats.stdDev = Math.sqrt(avgSquareDiff);
  } else {
    stats.stdDev = 0;
  }
  
  return stats;
}

function getStudentStats(studentId) {
  const c = getClass();
  if (!c) return null;
  
  const visibleTests = c.tests.filter(t => !t.hidden);
  const scores = visibleTests.map(t => ({
    id: t.id,
    name: t.name,
    date: t.date,
    total: getTotal(studentId, t.id)
  })).filter(d => d.total !== null);
  
  if (!scores.length) return null;
  
  const totals = scores.map(s => s.total);
  const avg = totals.reduce((a, b) => a + b, 0) / totals.length;
  const max = Math.max(...totals);
  const min = Math.min(...totals);
  const sorted = [...totals].sort((a, b) => a - b);
  const median = sorted[Math.floor(sorted.length / 2)];
  const trend = scores.length > 1 ? scores[scores.length - 1].total - scores[0].total : 0;
  
  const classStats = getClassStats();
  const classAvg = classStats ? classStats.classAverage : 0;
  
  return {
    student: c.students.find(s => s.id === studentId),
    scores,
    avg,
    max,
    min,
    median,
    trend,
    classAvg,
    aboveAverage: avg > classAvg
  };
}

function drawProgressChart(canvas, studentId) {
  const c = getClass();
  if (!c) return;
  
  const visibleTests = c.tests.filter(t => !t.hidden);
  const data = visibleTests.map(test => ({
    name: test.name,
    date: test.date,
    total: getTotal(studentId, test.id)
  })).filter(d => d.total !== null);
  
  if (data.length < 1) return;
  
  const canvasWidth = canvas.width || 500;
  const canvasHeight = canvas.height || 250;
  canvas.width = canvasWidth;
  canvas.height = canvasHeight;
  const ctx = canvas.getContext('2d');
  
  const pad = { top: 20, right: 20, bottom: 50, left: 40 };
  const chartW = canvasWidth - pad.left - pad.right;
  const chartH = canvasHeight - pad.top - pad.bottom;
  
  const maxScore = 100;
  const minScore = 0;
  const range = maxScore - minScore;
  
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + chartH - (i / 4) * chartH;
    const value = minScore + (i / 4) * range;
    ctx.strokeStyle = '#d9d2c2';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + chartW, y);
    ctx.stroke();
    
    ctx.fillStyle = '#8a8170';
    ctx.font = '9px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(value), pad.left - 5, y + 3);
  }
  
  const classStats = getClassStats();
  if (classStats && data.length > 1) {
    ctx.strokeStyle = '#d9d2c2';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    data.forEach((point, i) => {
      const x = pad.left + (i / (data.length - 1)) * chartW;
      const y = pad.top + chartH - ((classStats.classAverage - minScore) / range) * chartH;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#8a8170';
    ctx.font = '8px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('Class avg', pad.left + chartW - 60, pad.top + chartH - ((classStats.classAverage - minScore) / range) * chartH - 5);
  }
  
  ctx.strokeStyle = '#3563a8';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  
  data.forEach((point, i) => {
    const x = pad.left + (i / (data.length - 1)) * chartW;
    const y = pad.top + chartH - ((point.total - minScore) / range) * chartH;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();
  
  data.forEach((point, i) => {
    const x = pad.left + (i / (data.length - 1)) * chartW;
    const y = pad.top + chartH - ((point.total - minScore) / range) * chartH;
    
    ctx.fillStyle = '#3563a8';
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'white';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.fillStyle = '#1f2a24';
    ctx.font = 'bold 9px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(point.total, x, y - 10);
    
    ctx.save();
    ctx.translate(x, canvasHeight - 5);
    ctx.rotate(-Math.PI / 4);
    ctx.fillStyle = '#1f2a24';
    ctx.font = '7px Arial';
    ctx.textAlign = 'right';
    const label = point.name.length > 15 ? point.name.slice(0, 13) + '…' : point.name;
    ctx.fillText(label, 0, 0);
    ctx.restore();
  });
}
